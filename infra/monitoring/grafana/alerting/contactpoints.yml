apiVersion: 1

# 프로덕션 전용 알림 채널. Slack webhook URL은 monitoring.env의 SLACK_WEBHOOK_URL로 주입.
contactPoints:
  - orgId: 1
    name: slack
    receivers:
      - uid: slack-default
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          title: "[gainsy] {{ .CommonLabels.alertname }}"
        disableResolveMessage: false
