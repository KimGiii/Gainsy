server:
  # Nginx 뒤에 위치하므로 X-Forwarded-* 헤더를 신뢰해
  # Spring이 원본 scheme(https), host, client-ip를 정확히 인식하도록 한다.
  forward-headers-strategy: native

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate

app:
  jwt:
    secret: ${JWT_SECRET}
  s3:
    bucket: healthcare-photos-prod
    region: ap-northeast-2
    endpoint: ${S3_ENDPOINT:}
    public-endpoint: ${S3_PUBLIC_ENDPOINT:}
    path-style-access: ${S3_PATH_STYLE_ACCESS:false}
  fcm:
    credentials-path: ${FCM_CREDENTIALS_PATH}
  food-api:
    public-api-key: ${PUBLIC_FOOD_API_KEY}

logging:
  level:
    com.healthcare: INFO
    root: WARN
