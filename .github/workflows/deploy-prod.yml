name: Deploy → Prod

on:
  push:
    branches: [prod]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: healthcare-api
  IMAGE_TAG: prod-${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy to Prod
    runs-on: ubuntu-latest
    environment: prod      # GitHub Environment 보호 규칙 (수동 승인)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        working-directory: backend
        run: |
          ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Prod EC2 (blue-green swap)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail

            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}

            docker pull ${{ env.IMAGE }}

            # 현재 활성 포트 파악 (없으면 8080이 blue 기본)
            ACTIVE_PORT=$(cat /etc/healthcare/active_port 2>/dev/null || echo "8080")
            if [ "$ACTIVE_PORT" = "8080" ]; then
              GREEN_PORT=8081; BLUE_NAME=healthcare-api-8080; GREEN_NAME=healthcare-api-8081
            else
              GREEN_PORT=8080; BLUE_NAME=healthcare-api-8081; GREEN_NAME=healthcare-api-8080
            fi

            # 잔여 green 정리
            docker stop $GREEN_NAME || true
            docker rm   $GREEN_NAME || true

            docker run -d \
              --name $GREEN_NAME \
              -p ${GREEN_PORT}:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL="${{ secrets.PROD_DB_URL }}" \
              -e DB_USERNAME="${{ secrets.PROD_DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}" \
              -e REDIS_HOST="${{ secrets.PROD_REDIS_HOST }}" \
              -e JWT_SECRET="${{ secrets.PROD_JWT_SECRET }}" \
              -e S3_BUCKET="healthcare-photos-prod" \
              -e S3_PATH_STYLE_ACCESS="false" \
              -e FCM_CREDENTIALS_PATH="/app/fcm-credentials.json" \
              -e OPENAI_API_KEY="${{ secrets.PROD_OPENAI_API_KEY }}" \
              -e PUBLIC_FOOD_API_KEY="${{ secrets.PROD_PUBLIC_FOOD_API_KEY }}" \
              -v /etc/healthcare/fcm-credentials.json:/app/fcm-credentials.json:ro \
              ${{ env.IMAGE }}

            # green 헬스체크
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://localhost:${GREEN_PORT}/actuator/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Green (port $GREEN_PORT) healthy — swapping nginx"

                # nginx upstream을 green 포트로 교체
                sudo sed -i \
                  "s|proxy_pass http://127.0.0.1:[0-9]*;|proxy_pass http://127.0.0.1:${GREEN_PORT};|g" \
                  /etc/nginx/sites-available/healthcare
                sudo nginx -t && sudo nginx -s reload

                # 활성 포트 기록
                echo "$GREEN_PORT" | sudo tee /etc/healthcare/active_port > /dev/null

                # 구 blue 컨테이너 제거
                docker stop $BLUE_NAME || true
                docker rm   $BLUE_NAME || true
                docker image prune -f
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 10s..."
              sleep 10
            done

            echo "Green instance failed health check — rolling back"
            docker stop $GREEN_NAME || true
            docker rm   $GREEN_NAME || true
            exit 1

      - name: Verify production health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            ACTIVE_PORT=$(cat /etc/healthcare/active_port 2>/dev/null || echo "8080")
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:${ACTIVE_PORT}/actuator/health || echo "000")
            if [ "$STATUS" != "200" ]; then
              echo "Production health check failed: $STATUS"
              exit 1
            fi
            echo "Production is healthy on port $ACTIVE_PORT"
