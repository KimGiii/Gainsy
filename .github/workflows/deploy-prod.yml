name: Deploy → Prod

on:
  push:
    branches: [prod]
    paths:
      - 'backend/**'

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: healthcare-api
  IMAGE_TAG: prod-${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy to Prod
    runs-on: ubuntu-latest
    environment: prod      # GitHub Environment 보호 규칙 (수동 승인)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        working-directory: backend
        run: |
          ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Prod EC2 (blue-green swap)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}

            docker pull ${{ env.IMAGE }}

            # 포트 8081로 새 컨테이너 기동
            docker stop healthcare-api-green || true
            docker rm  healthcare-api-green || true

            docker run -d \
              --name healthcare-api-green \
              -p 8081:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL="${{ secrets.PROD_DB_URL }}" \
              -e DB_USERNAME="${{ secrets.PROD_DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}" \
              -e REDIS_HOST="${{ secrets.PROD_REDIS_HOST }}" \
              -e JWT_SECRET="${{ secrets.PROD_JWT_SECRET }}" \
              -e S3_BUCKET="healthcare-photos-prod" \
              -e S3_PATH_STYLE_ACCESS="false" \
              -e FCM_CREDENTIALS_PATH="/app/fcm-credentials.json" \
              -e OPENAI_API_KEY="${{ secrets.PROD_OPENAI_API_KEY }}" \
              -e PUBLIC_FOOD_API_KEY="${{ secrets.PROD_PUBLIC_FOOD_API_KEY }}" \
              -v /etc/healthcare/fcm-credentials.json:/app/fcm-credentials.json:ro \
              ${{ env.IMAGE }}

            # 헬스체크 통과 후 트래픽 전환 (nginx upstream 교체)
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/actuator/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Green instance healthy — swapping traffic"
                sudo nginx -s reload
                docker stop healthcare-api-blue || true
                docker rm  healthcare-api-blue  || true
                docker rename healthcare-api-green healthcare-api-blue
                docker image prune -f
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 10s..."
              sleep 10
            done
            echo "Green instance failed health check — rolling back"
            docker stop healthcare-api-green || true
            docker rm  healthcare-api-green  || true
            exit 1

      - name: Verify production health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.PROD_DOMAIN }}/actuator/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Production health check failed: $STATUS"
            exit 1
          fi
          echo "Production is healthy"
