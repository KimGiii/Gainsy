name: Strip internal docs on prod

# dev에서만 관리하고 prod에는 노출하지 않을 내부 문서를 prod push 후 자동 제거한다.
# .gitattributes의 merge=ours가 콘텐츠 충돌만 처리할 수 있어 신규 파일 유입을 막지 못하기 때문.
# 워크플로 자체는 무한 루프를 막기 위해 bot 자신의 커밋은 트리거하지 않음.

on:
  push:
    branches: [prod]

permissions:
  contents: write

jobs:
  strip:
    runs-on: ubuntu-latest
    if: github.event.head_commit.author.email != 'github-actions[bot]@users.noreply.github.com'
    steps:
      - name: Checkout prod
        uses: actions/checkout@v4
        with:
          ref: prod
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Strip docs and CHANGELOG
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # 제외 대상이 실제로 존재할 때만 처리
          targets=()
          [ -d docs ] && targets+=(docs)
          [ -f CHANGELOG.md ] && targets+=(CHANGELOG.md)

          if [ ${#targets[@]} -eq 0 ]; then
            echo "No internal docs present on prod — skipping."
            exit 0
          fi

          git rm -rf "${targets[@]}"
          git commit -m "chore(prod): 내부 문서 자동 제거 (docs/ + CHANGELOG.md)"
          git push origin prod
