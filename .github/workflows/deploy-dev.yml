name: Deploy → Dev

on:
  push:
    branches: [dev]
    paths:
      - 'backend/**'

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: healthcare-api
  IMAGE_TAG: dev-${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        working-directory: backend
        run: |
          ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Dev EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}

            docker pull ${{ env.IMAGE }}

            docker stop healthcare-api || true
            docker rm healthcare-api || true

            docker run -d \
              --name healthcare-api \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=dev \
              -e DB_URL="${{ secrets.DEV_DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DEV_DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DEV_DB_PASSWORD }}" \
              -e REDIS_HOST="${{ secrets.DEV_REDIS_HOST }}" \
              -e JWT_SECRET="${{ secrets.DEV_JWT_SECRET }}" \
              -e S3_BUCKET="healthcare-photos-dev" \
              -e S3_ENDPOINT="${{ secrets.DEV_S3_ENDPOINT }}" \
              -e S3_PATH_STYLE_ACCESS="false" \
              -e FCM_CREDENTIALS_PATH="/app/fcm-credentials.json" \
              -e OPENAI_API_KEY="${{ secrets.DEV_OPENAI_API_KEY }}" \
              -e PUBLIC_FOOD_API_KEY="${{ secrets.DEV_PUBLIC_FOOD_API_KEY }}" \
              -v /etc/healthcare/fcm-credentials.json:/app/fcm-credentials.json:ro \
              ${{ env.IMAGE }}

            docker image prune -f

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.DEV_SSH_HOST }}:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          exit 1
