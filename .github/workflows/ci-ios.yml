name: iOS CI

on:
  push:
    branches: [main, dev, prod]
    paths:
      - 'ios/**'
      - '.github/workflows/ci-ios.yml'
  pull_request:
    branches: [main, dev, prod]
    paths:
      - 'ios/**'
      - '.github/workflows/ci-ios.yml'

jobs:
  test:
    name: Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Run unit tests
        working-directory: ios
        run: |
          xcodebuild test \
            -project HealthCare.xcodeproj \
            -scheme HealthCare \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:HealthCareTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit --output test-results/results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/test-results/

  build:
    name: Build (Release)
    runs-on: macos-15
    needs: test
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/prod'

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build (Release, no signing)
        working-directory: ios
        run: |
          xcodebuild build \
            -project HealthCare.xcodeproj \
            -scheme HealthCare \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
