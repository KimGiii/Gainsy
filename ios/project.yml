name: HealthCare
options:
  bundleIdPrefix: com.kingloo.gainsy
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Debug
  createIntermediateGroups: true
  xcodeVersion: "16.0"
  groupSortPosition: none

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_NAME: HealthCare
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete

configs:
  Debug: debug
  Staging: debug
  Release: release

configFiles:
  Debug: Configs/Debug.xcconfig
  Staging: Configs/Staging.xcconfig
  Release: Configs/Release.xcconfig

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  HealthCare:
    type: application
    platform: iOS
    sources:
      - path: HealthCare
        excludes:
          - "**/*.md"
    info:
      path: HealthCare/Resources/Info.plist
      properties:
        CFBundleDisplayName: Vitae
        CFBundleIdentifier: com.kingloo.gainsy.ios
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: SplashBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSCameraUsageDescription: "진행 사진을 찍기 위해 카메라 접근 권한이 필요합니다."
        NSPhotoLibraryUsageDescription: "진행 사진을 저장하기 위해 사진 라이브러리 접근 권한이 필요합니다."
        NSHealthShareUsageDescription: "건강 데이터를 읽어 운동 및 식단 목표 달성을 지원합니다."
        NSHealthUpdateUsageDescription: "운동 및 식단 기록을 건강 앱에 저장합니다."
        NSUserNotificationUsageDescription: "주간 건강 요약 및 목표 달성 알림을 받습니다."
        UIBackgroundModes:
          - remote-notification
        FirebaseAppDelegateProxyEnabled: false
        ITSAppUsesNonExemptEncryption: false
        API_BASE_URL: "$(BASE_URL)"
    settings:
      base:
        INFOPLIST_FILE: HealthCare/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kingloo.gainsy.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAnalytics
      - package: FirebaseSDK
        product: FirebaseMessaging
    scheme:
      testTargets:
        - HealthCareTests
        - HealthCareUITests

  HealthCareTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HealthCareTests
    dependencies:
      - target: HealthCare
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: HealthCareTests
        PRODUCT_BUNDLE_IDENTIFIER: com.kingloo.gainsy.ios.tests
        GENERATE_INFOPLIST_FILE: YES

  HealthCareUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HealthCareUITests
    dependencies:
      - target: HealthCare
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: HealthCareUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.kingloo.gainsy.ios.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  HealthCare:
    build:
      targets:
        HealthCare: all
        HealthCareTests: [test]
        HealthCareUITests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: BASE_URL
          value: https://api.gainsy.site
          isEnabled: true
    test:
      config: Debug
      targets:
        - name: HealthCareTests
          randomExecutionOrder: true
        - name: HealthCareUITests
          randomExecutionOrder: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  HealthCare-Staging:
    build:
      targets:
        HealthCare: all
    run:
      config: Staging
      environmentVariables:
        - variable: BASE_URL
          value: https://api.gainsy.site
          isEnabled: true
    profile:
      config: Staging
    analyze:
      config: Staging
    archive:
      config: Release
